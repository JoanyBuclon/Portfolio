server {
    listen 80;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets (Vite outputs to /_astro/) — immutable cache
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static public assets — immutable cache
    location ~* \.(ico|svg|webp|png|jpg|jpeg|gif|woff2|woff)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # HTML pages — no-cache + security headers
    location / {
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        try_files $uri $uri/index.html $uri.html =404;
    }
}
